        const grid = document.getElementById('studentGrid');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');

        const colors = [
            'from-blue-400 to-blue-600', 
            'from-emerald-400 to-emerald-600', 
            'from-rose-400 to-rose-600', 
            'from-amber-400 to-amber-600', 
            'from-violet-400 to-violet-600', 
            'from-sky-400 to-sky-600',
            'from-pink-400 to-pink-600',
            'from-indigo-400 to-indigo-600'
        ];

        function renderStudents(filter = "") {
            const filtered = studentData.filter(s => s.name.includes(filter));
            
            grid.innerHTML = "";

            if (filtered.length === 0) {
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                filtered.forEach((student, index) => {
                    const colorIdx = index % colors.length;
                    const circleContainer = document.createElement('div');
                    circleContainer.className = "flex flex-col items-center gap-3 w-24 sm:w-28";
                    
                    const hasLinkClass = student.url ? "has-link" : "";
                    
                    circleContainer.innerHTML = `
                        <div class="student-circle ${hasLinkClass} w-20 h-20 sm:w-24 sm:h-24 rounded-full bg-gradient-to-br ${colors[colorIdx]} flex items-center justify-center text-white shadow-lg text-2xl font-bold"
                             onclick="handleStudentClick('${student.name}', '${student.url}')">
                            ${student.name.charAt(0)}
                        </div>
                        <span class="text-sm font-medium text-slate-600 text-center">${student.name}</span>
                    `;
                    grid.appendChild(circleContainer);
                });
            }
        }

        window.handleStudentClick = function(name, url) {
            if (url) {
                window.open(url, '_blank');
            } else {
                console.log("此學生尚未提供連結：" + name);
            }
        };

        searchInput.addEventListener('input', (e) => {
            renderStudents(e.target.value.trim());
        });

        renderStudents();
    </script>
